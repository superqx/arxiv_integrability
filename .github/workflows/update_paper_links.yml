name: Weekly Update Paper Links & Format

on:
  workflow_dispatch:           # allow manual trigger
  schedule:
    - cron: '0 5 * * 0'       
env:
  GITHUB_USER_NAME: superqx
  GITHUB_USER_EMAIL: superqx.hh@gmail.com
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

permissions:
  contents: write

jobs:
  update-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests arxiv pyyaml pdfplumber

      - name: Update paper links/format
        run: python daily_arxiv.py --update_paper_links

      - name: Commit & Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Weekly update: reformatted paper links & summaries"
          file_pattern: |
            docs/int-arxiv-daily.json
            docs/int-arxiv-daily-web.json
            docs/index.md
            docs/int-arxiv-daily-wechat.json
            docs/wechat.md
            README.md
          commit_user_name: ${{ env.GITHUB_USER_NAME }}
          commit_user_email: ${{ env.GITHUB_USER_EMAIL }}