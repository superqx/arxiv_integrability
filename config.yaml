      - "infinite integrals of motion"
      - "lax pair"
      - "Lax formulation"
      - "infinite commuting charges"
      - "Yang-Baxter integrability"
      - "Reflection equation"
      - "Boundary Yang-Baxter equation"
      - "algebraic Bethe ansatz"
      - "coordinate Bethe ansatz"
      - "thermodynamic Bethe ansatz"
      - "analytical Bethe ansatz"
      - "sine-Gordon model"
      - "Liouville field theory"
