name: Run Arxiv Papers Daily

on:
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * 1-5'   # 12:30 Beijing time (UTC+8), weekdays only

env:
  GITHUB_USER_NAME: superqx
  GITHUB_USER_EMAIL: superqx.hh@gmail.com
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

permissions:
  contents: write   # ← REQUIRED for push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4   # updated

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests arxiv pyyaml pdfplumber   # or use requirements.txt (fixed)

      - name: Run daily arxiv
        run: python daily_arxiv.py

      - name: Commit & Push updates
        uses: stefanzweifel/git-auto-commit-action@v5   # modern replacement
        with:
          commit_message: "Github Action Automatic Update Integrability Arxiv Papers"
          file_pattern: |
            README.md
            docs/int-arxiv-daily.json
            docs/int-arxiv-daily-web.json
            docs/index.md
            docs/int-arxiv-daily-wechat.json
            docs/wechat.md
          commit_user_name: ${{ env.GITHUB_USER_NAME }}
          commit_user_email: ${{ env.GITHUB_USER_EMAIL }}